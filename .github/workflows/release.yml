name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      sha256: ${{ steps.sha.outputs.hash }}
    steps:
      - uses: actions/checkout@v7

      - name: Build Lumen
        run: |
          xcodebuild \
            -project Lumen.xcodeproj \
            -scheme Lumen \
            -configuration Release \
            -derivedDataPath ./build \
            build

      - name: Package
        run: |
          mkdir -p dist
          ditto -c -k --keepParent \
            ./build/Build/Products/Release/Lumen.app \
            ./dist/Lumen.zip

      - name: Compute SHA256
        id: sha
        run: |
          echo "hash=$(shasum -a 256 ./dist/Lumen.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/Lumen.zip
          generate_release_notes: true

  update-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          repository: anishathalye/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Generate cask formula
        run: |
          V="${GITHUB_REF_NAME#v}"
          mkdir -p tap/Casks
          cat > tap/Casks/lumen.rb << EOF
          cask "lumen" do
            version "${V}"
            sha256 "${SHA256}"

            url "https://github.com/anishathalye/lumen/releases/download/v#{version}/Lumen.zip"
            name "Lumen"
            desc "Magic auto brightness based on screen contents"
            homepage "https://github.com/anishathalye/lumen"

            depends_on :macos

            app "Lumen.app"

            postflight do
              system_command("/usr/bin/xattr",
                             args: ["-rd", "com.apple.quarantine", "#{appdir}/Lumen.app"],
                             sudo: false,
                             print_stderr: false)
            rescue
              nil
            end

            zap trash: [
              "~/Library/Caches/com.anishathalye.Lumen",
              "~/Library/Preferences/com.anishathalye.Lumen.plist",
            ]
          end
          EOF
        env:
          SHA256: ${{ needs.build.outputs.sha256 }}

      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/lumen.rb
          git diff --staged --quiet || git commit -m "lumen ${GITHUB_REF_NAME}"
          git push
